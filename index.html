
<!DOCTYPE html>
<html lang="en">

<head>

  <!-- 🧠 Browser Information -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- 🌟 Website Title -->
  <title>My Advanced To-Do App</title>

  <!-- 🎨 CSS File -->
  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- 📦 MAIN APP CONTAINER -->
  <div class="container">

    <!-- 🌙 DARK MODE BUTTON -->
    <button
      class="dark-mode-btn"
      id="darkModeBtn"
    >
      🌙 Dark Mode
    </button>


    <!-- 📝 APP TITLE -->
    <h1 class="app-title">

      ✅ My To-Do List

    </h1>


    <!-- 📊 TASK COUNTERS -->
    <div class="counters">

      <!-- TOTAL -->
      <div class="counter-box">

        <span id="totalCount">0</span>

        <p>Total Tasks</p>

      </div>


      <!-- COMPLETED -->
      <div class="counter-box">

        <span id="completedCount">0</span>

        <p>Completed</p>

      </div>


      <!-- PENDING -->
      <div class="counter-box">

        <span id="pendingCount">0</span>

        <p>Pending</p>

      </div>

    </div>


    <!-- ✏️ INPUT AREA -->
    <div class="input-area">

      <!-- 📝 TASK TEXT -->
      <input
        type="text"
        id="taskInput"
        placeholder="Write a task... e.g. Buy milk 🥛"
      />


      <!-- 📅 DUE DATE -->
      <input
        type="date"
        id="dueDateInput"
      />


      <!-- 🏷️ CATEGORY -->
      <select id="categoryInput">

        <option value="Personal">
          🏠 Personal
        </option>

        <option value="Study">
          📚 Study
        </option>

        <option value="Work">
          💼 Work
        </option>

        <option value="Health">
          💪 Health
        </option>

        <option value="Shopping">
          🛒 Shopping
        </option>

      </select>


      <!-- 🚨 PRIORITY -->
      <select id="priorityInput">

        <option value="Low">
          🟢 Low
        </option>

        <option value="Medium">
          🟡 Medium
        </option>

        <option value="High">
          🔴 High
        </option>

      </select>


      <!-- ➕ ADD BUTTON -->
      <button id="addTaskBtn">

        + Add Task

      </button>

    </div>


    <!-- ⚠️ ERROR MESSAGE -->
    <p
      class="error-msg"
      id="errorMsg"
    >
    </p>


    <!-- 🔍 SEARCH BAR -->
    <div class="search-area">

      <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search your tasks..."
      />

    </div>


    <!-- 🔽 FILTER BUTTONS -->
    <div class="filters">

      <!-- ALL -->
      <button
        class="filter-btn active"
        data-filter="all"
      >
        📋 All
      </button>


      <!-- COMPLETED -->
      <button
        class="filter-btn"
        data-filter="completed"
      >
        ✅ Completed
      </button>


      <!-- PENDING -->
      <button
        class="filter-btn"
        data-filter="pending"
      >
        ⏳ Pending
      </button>

    </div>


    <!-- 📋 TASK LIST -->
    <ul
      class="task-list"
      id="taskList"
    >

      <!-- Tasks added using JavaScript -->

    </ul>

  </div>


  <!-- 🧠 JAVASCRIPT -->
  <script src="script.js"></script>

</body>

</html>
