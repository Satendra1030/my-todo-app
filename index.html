<!DOCTYPE html>
<html lang="en">

<head>

  <!-- 🌍 BASIC SETTINGS -->
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- 🌟 WEBSITE TITLE -->
  <title>TaskFlow Pro | Advanced To-Do App</title>

  <!-- 🎨 CSS FILE -->
  <link
    rel="stylesheet"
    href="style.css"
  />

  <!-- ✨ GOOGLE FONTS -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

</head>

<body>

  <!-- 🌌 BACKGROUND BLUR CIRCLES -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <!-- 📦 MAIN APP -->
  <div class="container">

    <!-- =========================
         🚀 TOP HEADER
    ========================== -->

    <div class="top-bar">

      <!-- 📝 TITLE -->
      <div>

        <h1 class="app-title">
          🚀 TaskFlow Pro
        </h1>

        <p class="subtitle">
          Organize your day beautifully
        </p>

      </div>

      <!-- 🌙 DARK MODE -->
      <button
        class="dark-mode-btn"
        id="darkModeBtn"
      >
        🌙
      </button>

    </div>


    <!-- =========================
         📊 PRODUCTIVITY DASHBOARD
    ========================== -->

    <div class="dashboard">

      <!-- 📈 PROGRESS -->
      <div class="progress-card">

        <div class="progress-header">

          <span>📈 Daily Progress</span>

          <span id="progressText">
            0%
          </span>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill"
          ></div>

        </div>

      </div>


      <!-- 🔥 STREAK -->
      <div class="dashboard-card">

        <h3>🔥 Streak</h3>

        <p id="streakCount">
          0 Days
        </p>

      </div>


      <!-- ⏰ CLOCK -->
      <div class="dashboard-card">

        <h3>⏰ Time</h3>

        <p id="liveClock">
          00:00
        </p>

      </div>

    </div>


    <!-- 🏆 MOTIVATION -->
    <div
      class="motivation-box"
      id="motivationBox"
    >
      🚀 Start your productive day!
    </div>


    <!-- =========================
         ✏️ INPUT SECTION
    ========================== -->

    <div class="input-area">

      <!-- 📝 TASK INPUT -->
      <input
        type="text"
        id="taskInput"
        placeholder="✨ What needs to be done?"
      />

      <!-- 📅 DATE -->
      <input
        type="date"
        id="dueDateInput"
      />

      <!-- 🏷️ CATEGORY -->
      <select id="categoryInput">

        <option value="Personal">
          🏠 Personal
        </option>

        <option value="Study">
          📚 Study
        </option>

        <option value="Work">
          💼 Work
        </option>

        <option value="Health">
          💪 Health
        </option>

        <option value="Shopping">
          🛒 Shopping
        </option>

      </select>

      <!-- 🚨 PRIORITY -->
      <select id="priorityInput">

        <option value="Low">
          🟢 Low
        </option>

        <option value="Medium">
          🟡 Medium
        </option>

        <option value="High">
          🔴 High
        </option>

      </select>

      <!-- ➕ BUTTON -->
      <button id="addTaskBtn">

        ➕ Add

      </button>

    </div>


    <!-- ⚠️ ERROR -->
    <p
      class="error-msg"
      id="errorMsg"
    ></p>


    <!-- =========================
         🔍 SEARCH + FILTERS
    ========================== -->

    <div class="toolbar">

      <!-- 🔍 SEARCH -->
      <div class="search-area">

        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks..."
        />

      </div>


      <!-- 🔽 FILTERS -->
      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          📋 All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          ✅ Done
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          ⏳ Pending
        </button>

      </div>

    </div>


    <!-- =========================
         📊 COUNTERS
    ========================== -->

    <div class="counters">

      <div class="counter-box">

        <span id="totalCount">
          0
        </span>

        <p>Total</p>

      </div>

      <div class="counter-box">

        <span id="completedCount">
          0
        </span>

        <p>Completed</p>

      </div>

      <div class="counter-box">

        <span id="pendingCount">
          0
        </span>

        <p>Pending</p>

      </div>

    </div>


    <!-- =========================
         📋 TASK LIST
    ========================== -->

    <ul
      class="task-list"
      id="taskList"
    >

      <!-- JavaScript Tasks -->

    </ul>


    <!-- =========================
         🗑️ CLEAR BUTTON
    ========================== -->

    <button
      class="clear-all-btn"
      id="clearAllBtn"
    >
      🗑️ Clear All Tasks
    </button>

  </div>


  <!-- =========================
       🧠 JAVASCRIPT
  ========================== -->

  <script src="script.js"></script>

</body>

</html>
