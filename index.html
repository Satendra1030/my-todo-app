<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>TaskFlow Pro Ultra</title>

  <!-- Google Font -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- =========================================
       🚀 APP CONTAINER
  ========================================== -->

  <div class="app-container">

    <!-- =========================================
         🏆 HEADER
    ========================================== -->

    <header class="app-header">

      <div class="logo-section">

        <h1>🚀 TaskFlow Pro</h1>

        <p>
          Ultra Modern Productivity Dashboard
        </p>

      </div>

    </header>


    <!-- =========================================
         📊 TOP DASHBOARD
    ========================================== -->

    <section class="top-dashboard">

      <!-- Progress -->
      <div class="dashboard-card">

        <h3>
          Productivity Progress
        </h3>

        <div class="progress-bar">

          <div
            id="progressFill"
            class="progress-fill"
          ></div>

        </div>

        <div
          id="progressText"
          class="progress-text"
        >
          0%
        </div>

      </div>


      <!-- Completed -->
      <div class="dashboard-card">

        <h3>Completed</h3>

        <div
          id="streakCount"
          class="streak-box"
        >
          0 Done
        </div>

      </div>


      <!-- Live Clock -->
      <div class="dashboard-card">

        <h3>Live Time</h3>

        <div
          id="liveClock"
          class="clock-box"
        >
          00:00
        </div>

      </div>

    </section>


    <!-- =========================================
         💬 MOTIVATION
    ========================================== -->

    <div
      id="motivationBox"
      class="motivation-box"
    >
      🚀 Start your productive day!
    </div>


    <!-- =========================================
         📝 TASK FORM
    ========================================== -->

    <section class="task-form">

      <!-- Task -->
      <input
        type="text"
        id="taskInput"
        placeholder="Enter your task..."
      />

      <!-- Due Date -->
      <input
        type="date"
        id="dueDateInput"
      />

      <!-- Category -->
      <select id="categoryInput">

        <option value="Personal">
          🏠 Personal
        </option>

        <option value="Study">
          📚 Study
        </option>

        <option value="Work">
          💼 Work
        </option>

        <option value="Health">
          💪 Health
        </option>

        <option value="Shopping">
          🛒 Shopping
        </option>

      </select>

      <!-- Priority -->
      <select id="priorityInput">

        <option value="Low">
          🟢 Low
        </option>

        <option value="Medium">
          🟡 Medium
        </option>

        <option value="High">
          🔴 High
        </option>

      </select>

      <!-- Add -->
      <button
        id="addTaskBtn"
        class="add-btn"
      >
        ➕ Add
      </button>

    </section>


    <!-- Error -->
    <p id="errorMsg"></p>


    <!-- =========================================
         🔍 CONTROLS
    ========================================== -->

    <section class="controls-section">

      <!-- Search -->
      <div class="search-box">

        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks..."
        />

      </div>


      <!-- Filters -->
      <div class="filter-group">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completed
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pending
        </button>

      </div>


      <!-- Sort -->
      <select
        id="sortSelect"
        class="sort-select"
      >

        <option value="newest">
          🆕 Newest
        </option>

        <option value="oldest">
          🕰️ Oldest
        </option>

        <option value="priority">
          🚨 Priority
        </option>

        <option value="alphabetical">
          🔤 A-Z
        </option>

      </select>

    </section>


    <!-- =========================================
         📊 STATS
    ========================================== -->

    <section class="stats-grid">

      <!-- Total -->
      <div class="stat-card">

        <h2 id="totalCount">0</h2>

        <p>Total Tasks</p>

      </div>


      <!-- Completed -->
      <div class="stat-card">

        <h2 id="completedCount">0</h2>

        <p>Completed</p>

      </div>


      <!-- Pending -->
      <div class="stat-card">

        <h2 id="pendingCount">0</h2>

        <p>Pending</p>

      </div>

    </section>


    <!-- =========================================
         📋 TASK LIST
    ========================================== -->

    <ul
      id="taskList"
      class="task-list"
    >

      <!-- JS RENDERS TASKS -->

    </ul>


    <!-- =========================================
         ⚙️ BOTTOM ACTIONS
    ========================================== -->

    <section class="bottom-actions">

      <div
        id="taskCountLabel"
        class="task-count-label"
      >
        0 Tasks
      </div>

      <button
        id="clearAllBtn"
        class="clear-btn"
      >
        🗑️ Clear All
      </button>

    </section>

  </div>


  <!-- =========================================
       🔔 TOAST
  ========================================== -->

  <div
    id="toast"
    class="toast"
  ></div>


  <!-- =========================================
       📜 SCRIPT
  ========================================== -->

  <script src="script.js"></script>

</body>

</html>
