```html
<!DOCTYPE html>
<html lang="en">

<head>
  <!-- 🧠 Browser information -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🌟 Website title -->
  <title>My To-Do App</title>

  <!-- 🎨 Connect CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 📦 Main container -->
  <div class="container">

    <!-- 🌙 Dark Mode Button -->
    <button class="dark-mode-btn" id="darkModeBtn">
      🌙 Dark Mode
    </button>

    <!-- 📝 App Title -->
    <h1 class="app-title">My To-Do List</h1>

    <!-- 📊 Task Counters -->
    <div class="counters">

      <!-- Total Tasks -->
      <div class="counter-box">
        <span id="totalCount">0</span>
        <p>Total</p>
      </div>

      <!-- Completed Tasks -->
      <div class="counter-box">
        <span id="completedCount">0</span>
        <p>Completed</p>
      </div>

      <!-- Pending Tasks -->
      <div class="counter-box">
        <span id="pendingCount">0</span>
        <p>Pending</p>
      </div>

    </div>

    <!-- ✏️ INPUT AREA -->
    <div class="input-area">

      <!-- 📝 Task text -->
      <input
        type="text"
        id="taskInput"
        placeholder="Write a task... e.g. Buy milk 🥛"
      />

      <!-- 📅 Due date -->
      <input
        type="date"
        id="dueDateInput"
      />

      <!-- 🏷️ Category Dropdown -->
      <select id="categoryInput">

        <option value="Personal">
          🏠 Personal
        </option>

        <option value="Study">
          📚 Study
        </option>

        <option value="Work">
          💼 Work
        </option>

        <option value="Health">
          💪 Health
        </option>

        <option value="Shopping">
          🛒 Shopping
        </option>

      </select>

      <!-- ➕ Add Button -->
      <button id="addTaskBtn">
        + Add Task
      </button>

    </div>

    <!-- ⚠️ Error Message -->
    <p class="error-msg" id="errorMsg"></p>

    <!-- 🔽 Filter Buttons -->
    <div class="filters">

      <button
        class="filter-btn active"
        data-filter="all"
      >
        All Tasks
      </button>

      <button
        class="filter-btn"
        data-filter="completed"
      >
        ✅ Completed
      </button>

      <button
        class="filter-btn"
        data-filter="pending"
      >
        ⏳ Pending
      </button>

    </div>

    <!-- 📋 Task List -->
    <ul class="task-list" id="taskList">

      <!-- Tasks added by JavaScript -->

    </ul>

  </div>

  <!-- 🧠 Connect JavaScript -->
  <script src="script.js"></script>

</body>

</html>
```
