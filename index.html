<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    TaskFlow Pro Ultra
  </title>

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>


  <!-- ============================================
       🌌 BACKGROUND GLOW
  ============================================= -->

  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>
  <div class="bg-glow glow3"></div>


  <div class="app">


    <!-- ============================================
         🚀 HEADER
    ============================================= -->

    <header class="header glass">

      <div class="header-top">

        <div class="logo">

          <h1>
            🚀 TaskFlow Pro
          </h1>

          <p>
            Ultra Modern Productivity Dashboard
          </p>

        </div>


        <!-- LIVE CLOCK -->

        <div class="clock-box glass-light">

          <span class="clock-label">
            <i class="fa-regular fa-clock"></i>
            Live Time
          </span>

          <h2 id="liveClock">
            00:00
          </h2>

        </div>

      </div>


      <!-- ============================================
           📈 PROGRESS
      ============================================= -->

      <div class="progress-section">

        <div class="progress-header">

          <span>
            Productivity Progress
          </span>

          <span id="progressText">
            0%
          </span>

        </div>

        <div class="progress-bar">

          <div
            id="progressFill"
            class="progress-fill"
          ></div>

        </div>

        <div class="progress-bottom">

          <div
            class="streak-box glass-light"
            id="streakCount"
          >
            🔥 0 Done
          </div>

          <div
            class="motivation-box glass-light"
            id="motivationBox"
          >
            🚀 Start your productive day!
          </div>

        </div>

      </div>

    </header>


    <!-- ============================================
         ✍️ INPUT SECTION
    ============================================= -->

    <section class="input-card glass">

      <div class="input-grid">

        <!-- TASK INPUT -->

        <div class="input-wrapper">

          <i class="fa-solid fa-pen"></i>

          <input
            type="text"
            id="taskInput"
            placeholder="Enter your task..."
          >

        </div>


        <!-- DATE -->

        <div class="input-wrapper">

          <i class="fa-regular fa-calendar"></i>

          <input
            type="date"
            id="dueDateInput"
          >

        </div>


        <!-- CATEGORY -->

        <div class="input-wrapper">

          <i class="fa-solid fa-layer-group"></i>

          <select id="categoryInput">

            <option value="Personal">
              🏠 Personal
            </option>

            <option value="Study">
              📚 Study
            </option>

            <option value="Work">
              💼 Work
            </option>

            <option value="Health">
              💪 Health
            </option>

            <option value="Shopping">
              🛒 Shopping
            </option>

          </select>

        </div>


        <!-- PRIORITY -->

        <div class="input-wrapper">

          <i class="fa-solid fa-flag"></i>

          <select id="priorityInput">

            <option value="Low">
              🟢 Low
            </option>

            <option value="Medium">
              🟡 Medium
            </option>

            <option value="High">
              🔴 High
            </option>

          </select>

        </div>


        <!-- ADD BUTTON -->

        <button
          id="addTaskBtn"
          class="add-btn"
        >
          <i class="fa-solid fa-plus"></i>
          Add
        </button>

      </div>

      <p id="errorMsg"></p>

    </section>


    <!-- ============================================
         🔍 TOOLBAR
    ============================================= -->

    <section class="toolbar">

      <div class="search-box glass">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          id="searchInput"
          placeholder="Search tasks..."
        >

      </div>


      <!-- FILTERS -->

      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completed
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pending
        </button>

      </div>


      <!-- SORT -->

      <select
        id="sortSelect"
        class="sort-select glass"
      >

        <option value="newest">
          🆕 Newest
        </option>

        <option value="oldest">
          🕰️ Oldest
        </option>

        <option value="priority">
          🔥 Priority
        </option>

        <option value="alphabetical">
          🔤 A-Z
        </option>

      </select>

    </section>


    <!-- ============================================
         📊 STATS
    ============================================= -->

    <section class="stats-grid">

      <div class="stat-card glass">

        <div class="stat-icon purple">
          <i class="fa-solid fa-list-check"></i>
        </div>

        <h3>
          Total Tasks
        </h3>

        <h1 id="totalCount">
          0
        </h1>

      </div>


      <div class="stat-card glass">

        <div class="stat-icon green">
          <i class="fa-solid fa-circle-check"></i>
        </div>

        <h3>
          Completed
        </h3>

        <h1 id="completedCount">
          0
        </h1>

      </div>


      <div class="stat-card glass">

        <div class="stat-icon red">
          <i class="fa-solid fa-clock"></i>
        </div>

        <h3>
          Pending
        </h3>

        <h1 id="pendingCount">
          0
        </h1>

      </div>

    </section>


    <!-- ============================================
         📋 TASK SECTION
    ============================================= -->

    <section class="tasks-section glass">

      <div class="tasks-header">

        <h2 id="taskCountLabel">
          0 Tasks
        </h2>

        <div class="task-actions-top">

          <button
            id="exportBtn"
            class="action-btn export-btn"
          >
            <i class="fa-solid fa-file-export"></i>
            Export
          </button>

          <button
            id="clearAllBtn"
            class="action-btn clear-btn"
          >
            <i class="fa-solid fa-trash"></i>
            Clear All
          </button>

        </div>

      </div>


      <!-- TASK LIST -->

      <ul
        id="taskList"
        class="task-list"
      >

        <li class="empty-state">

          <div class="empty-icon">
            📝
          </div>

          <h3>
            No tasks found
          </h3>

          <p>
            Add a task and start being productive.
          </p>

        </li>

      </ul>

    </section>

  </div>


  <!-- ============================================
       🔔 TOAST
  ============================================= -->

  <div
    id="toast"
    class="toast"
  ></div>


  <script src="script.js"></script>

</body>
</html>
