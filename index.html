<!DOCTYPE html>
<html lang="en">

<head>

  <!-- =========================================
       🌍 BASIC SETTINGS
  ========================================== -->

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- 🌟 SEO -->
  <meta
    name="description"
    content="TaskFlow Pro - Beautiful advanced productivity and task management app."
  />

  <meta
    name="theme-color"
    content="#4f46e5"
  />

  <!-- 🌟 WEBSITE TITLE -->
  <title>TaskFlow Pro | Advanced To-Do App</title>

  <!-- 🎨 CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  />

  <!-- ✨ GOOGLE FONTS -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- 📱 PWA -->
  <link
    rel="manifest"
    href="manifest.json"
  />

</head>

<body>

  <!-- =========================================
       🌌 BACKGROUND EFFECTS
  ========================================== -->

  <div class="bg-circle bg-circle-1"></div>

  <div class="bg-circle bg-circle-2"></div>

  <div class="grid-overlay"></div>


  <!-- =========================================
       📦 MAIN APP
  ========================================== -->

  <div class="container">

    <!-- =========================================
         🚀 TOP HEADER
    ========================================== -->

    <header class="top-bar">

      <!-- 📝 LEFT -->
      <div class="hero-text">

        <h1 class="app-title">

          🚀 TaskFlow Pro

        </h1>

        <p class="subtitle">

          Organize your life beautifully & stay productive every day

        </p>

      </div>


      <!-- 🌙 RIGHT -->
      <div class="top-actions">

        <!-- 🔔 NOTIFICATIONS -->
        <button
          class="icon-btn"
          id="notificationBtn"
          title="Notifications"
        >
          🔔
        </button>

        <!-- 🌙 DARK MODE -->
        <button
          class="dark-mode-btn"
          id="darkModeBtn"
          title="Toggle Theme"
        >
          🌙
        </button>

      </div>

    </header>


    <!-- =========================================
         📊 PRODUCTIVITY DASHBOARD
    ========================================== -->

    <section class="dashboard">

      <!-- 📈 PROGRESS -->
      <div class="dashboard-card progress-card">

        <div class="progress-header">

          <span>

            📈 Daily Progress

          </span>

          <span id="progressText">

            0%

          </span>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill"
          ></div>

        </div>

      </div>


      <!-- 🔥 STREAK -->
      <div class="dashboard-card">

        <div class="card-icon">

          🔥

        </div>

        <h3>Streak</h3>

        <p id="streakCount">

          0 Days

        </p>

      </div>


      <!-- ⏰ LIVE CLOCK -->
      <div class="dashboard-card">

        <div class="card-icon">

          ⏰

        </div>

        <h3>Live Time</h3>

        <p id="liveClock">

          00:00

        </p>

      </div>


      <!-- 🎯 TASK GOAL -->
      <div class="dashboard-card">

        <div class="card-icon">

          🎯

        </div>

        <h3>Goal</h3>

        <p id="goalText">

          Stay Focused

        </p>

      </div>

    </section>


    <!-- =========================================
         🏆 MOTIVATION
    ========================================== -->

    <section
      class="motivation-box"
      id="motivationBox"
    >

      🚀 Start your productive day!

    </section>


    <!-- =========================================
         ✏️ TASK CREATOR
    ========================================== -->

    <section class="task-creator">

      <div class="input-area">

        <!-- 📝 TASK -->
        <div class="input-group">

          <label>

            Task

          </label>

          <input
            type="text"
            id="taskInput"
            placeholder="✨ What needs to be done?"
          />

        </div>


        <!-- 📅 DATE -->
        <div class="input-group">

          <label>

            Due Date

          </label>

          <input
            type="date"
            id="dueDateInput"
          />

        </div>


        <!-- 🏷️ CATEGORY -->
        <div class="input-group">

          <label>

            Category

          </label>

          <select id="categoryInput">

            <option value="Personal">

              🏠 Personal

            </option>

            <option value="Study">

              📚 Study

            </option>

            <option value="Work">

              💼 Work

            </option>

            <option value="Health">

              💪 Health

            </option>

            <option value="Shopping">

              🛒 Shopping

            </option>

          </select>

        </div>


        <!-- 🚨 PRIORITY -->
        <div class="input-group">

          <label>

            Priority

          </label>

          <select id="priorityInput">

            <option value="Low">

              🟢 Low

            </option>

            <option value="Medium">

              🟡 Medium

            </option>

            <option value="High">

              🔴 High

            </option>

          </select>

        </div>


        <!-- ➕ BUTTON -->
        <button id="addTaskBtn">

          ➕ Add Task

        </button>

      </div>

    </section>


    <!-- ⚠️ ERROR -->
    <p
      class="error-msg"
      id="errorMsg"
    ></p>


    <!-- =========================================
         🔍 SEARCH + TOOLBAR
    ========================================== -->

    <section class="toolbar">

      <!-- 🔍 SEARCH -->
      <div class="search-area">

        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks..."
        />

      </div>


      <!-- 🔽 FILTERS -->
      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >

          📋 All

        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >

          ✅ Done

        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >

          ⏳ Pending

        </button>

      </div>


      <!-- ↕️ SORT -->
      <div class="sort-area">

        <select id="sortSelect">

          <option value="newest">

            🆕 Newest

          </option>

          <option value="oldest">

            📜 Oldest

          </option>

          <option value="priority">

            🚨 Priority

          </option>

        </select>

      </div>

    </section>


    <!-- =========================================
         📊 STATS
    ========================================== -->

    <section class="counters">

      <div class="counter-box">

        <span id="totalCount">

          0

        </span>

        <p>Total</p>

      </div>

      <div class="counter-box">

        <span id="completedCount">

          0

        </span>

        <p>Completed</p>

      </div>

      <div class="counter-box">

        <span id="pendingCount">

          0

        </span>

        <p>Pending</p>

      </div>

    </section>


    <!-- =========================================
         📋 TASK LIST
    ========================================== -->

    <section class="task-section">

      <!-- 📌 SECTION HEADER -->
      <div class="section-title">

        <h2>

          📋 Your Tasks

        </h2>

        <span id="taskCountLabel">

          0 Tasks

        </span>

      </div>

      <!-- 📋 LIST -->
      <ul
        class="task-list"
        id="taskList"
      >

        <!-- JavaScript Tasks -->

      </ul>

    </section>


    <!-- =========================================
         🗑️ FOOTER ACTIONS
    ========================================== -->

    <footer class="footer-actions">

      <button
        class="clear-all-btn"
        id="clearAllBtn"
      >

        🗑️ Clear All Tasks

      </button>

      <button
        class="export-btn"
        id="exportBtn"
      >

        📤 Export Tasks

      </button>

    </footer>

  </div>


  <!-- =========================================
       🔔 TOAST NOTIFICATIONS
  ========================================== -->

  <div
    class="toast"
    id="toast"
  >

    Task Added Successfully ✅

  </div>


  <!-- =========================================
       🧠 JAVASCRIPT
  ========================================== -->

  <script src="script.js"></script>

</body>

</html>
