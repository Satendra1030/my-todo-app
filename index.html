<!DOCTYPE html>
<html lang="en">

<head>

  <!-- ============================================
       🌍 META
  ============================================= -->

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <!-- ============================================
       🚀 TITLE
  ============================================= -->

  <title>
    TaskFlow Pro Ultra
  </title>

  <!-- ============================================
       🔤 GOOGLE FONT
  ============================================= -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- ============================================
       🎨 CSS
  ============================================= -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body class="dark">

  <!-- ============================================
       ✨ BACKGROUND GLOW
  ============================================= -->

  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <!-- ============================================
       📦 MAIN CONTAINER
  ============================================= -->

  <div class="container">

    <!-- ============================================
         🚀 TOP BAR
    ============================================= -->

    <div class="top-bar">

      <div>

        <h1 class="app-title">
          TaskFlow Pro
        </h1>

        <p class="subtitle">
          Ultra Modern Productivity Dashboard
        </p>

      </div>

      <!-- 🌙 THEME BUTTON -->

      <button
        id="darkModeBtn"
        class="dark-mode-btn"
      >
        🌙
      </button>

    </div>

    <!-- ============================================
         📈 DASHBOARD
    ============================================= -->

    <div class="dashboard">

      <!-- 📊 PROGRESS -->

      <div class="progress-card">

        <div class="progress-header">

          <span>
            Productivity Progress
          </span>

          <span id="progressText">
            0%
          </span>

        </div>

        <div class="progress-bar">

          <div
            id="progressFill"
            class="progress-fill"
          ></div>

        </div>

      </div>

      <!-- 🏆 STREAK -->

      <div class="dashboard-card">

        <h3>
          Completed
        </h3>

        <p id="streakCount">
          0 Done
        </p>

      </div>

      <!-- 🕒 CLOCK -->

      <div class="dashboard-card">

        <h3>
          Live Time
        </h3>

        <p id="liveClock">
          00:00
        </p>

      </div>

    </div>

    <!-- ============================================
         💬 MOTIVATION
    ============================================= -->

    <div
      id="motivationBox"
      class="motivation-box"
    >

      🚀 Start your productive day!

    </div>

    <!-- ============================================
         ✏️ INPUT AREA
    ============================================= -->

    <div class="input-area">

      <!-- 📝 TASK -->

      <input
        type="text"
        id="taskInput"
        placeholder="Enter your task..."
      />

      <!-- 📅 DATE -->

      <input
        type="date"
        id="dueDateInput"
      />

      <!-- 🏷️ CATEGORY -->

      <select id="categoryInput">

        <option value="Personal">
          Personal
        </option>

        <option value="Study">
          Study
        </option>

        <option value="Work">
          Work
        </option>

        <option value="Health">
          Health
        </option>

        <option value="Shopping">
          Shopping
        </option>

      </select>

      <!-- 🚨 PRIORITY -->

      <select id="priorityInput">

        <option value="Low">
          Low
        </option>

        <option value="Medium">
          Medium
        </option>

        <option value="High">
          High
        </option>

      </select>

      <!-- ➕ BUTTON -->

      <button id="addTaskBtn">

        Add Task

      </button>

    </div>

    <!-- ============================================
         ⚠️ ERROR MESSAGE
    ============================================= -->

    <div
      id="errorMsg"
      class="error-msg"
    ></div>

    <!-- ============================================
         🔍 TOOLBAR
    ============================================= -->

    <div class="toolbar">

      <!-- 🔍 SEARCH -->

      <div class="search-area">

        <input
          type="text"
          id="searchInput"
          placeholder="Search tasks..."
        />

      </div>

      <!-- 🔽 FILTERS -->

      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completed
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pending
        </button>

      </div>

      <!-- ↕️ SORT -->

      <select id="sortSelect">

        <option value="newest">
          Newest
        </option>

        <option value="oldest">
          Oldest
        </option>

        <option value="priority">
          Priority
        </option>

        <option value="alphabetical">
          A-Z
        </option>

      </select>

    </div>

    <!-- ============================================
         📊 COUNTERS
    ============================================= -->

    <div class="counters">

      <!-- 📦 TOTAL -->

      <div class="counter-box">

        <span id="totalCount">
          0
        </span>

        <p>
          Total Tasks
        </p>

      </div>

      <!-- ✅ COMPLETED -->

      <div class="counter-box">

        <span id="completedCount">
          0
        </span>

        <p>
          Completed
        </p>

      </div>

      <!-- ⏳ PENDING -->

      <div class="counter-box">

        <span id="pendingCount">
          0
        </span>

        <p>
          Pending
        </p>

      </div>

    </div>

    <!-- ============================================
         📋 TASK HEADER
    ============================================= -->

    <div
      style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:18px;
        gap:16px;
        flex-wrap:wrap;
      "
    >

      <h2
        id="taskCountLabel"
        style="
          font-size:1.1rem;
          color:#d1d5db;
          font-weight:600;
        "
      >
        0 Tasks
      </h2>

      <!-- 🗑️ CLEAR -->

      <button
        id="clearAllBtn"
        class="clear-all-btn"
      >

        Clear All

      </button>

    </div>

    <!-- ============================================
         📋 TASK LIST
    ============================================= -->

    <ul
      id="taskList"
      class="task-list"
    ></ul>

  </div>

  <!-- ============================================
       🔔 TOAST
  ============================================= -->

  <div
    id="toast"
    class="toast"
  ></div>

  <!-- ============================================
       🚀 JAVASCRIPT
  ============================================= -->

  <script src="script.js"></script>

</body>

</html>
