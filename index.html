<!DOCTYPE html>
<html lang="en">

<head>

  <!-- ============================================ -->
  <!-- 🚀 META -->
  <!-- ============================================ -->

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    TaskFlow Pro Ultra
  </title>

  <!-- ============================================ -->
  <!-- 🎨 GOOGLE FONT -->
  <!-- ============================================ -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ============================================ -->
  <!-- 🎨 CSS -->
  <!-- ============================================ -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body class="dark">

  <!-- ============================================ -->
  <!-- 🌌 BACKGROUND -->
  <!-- ============================================ -->

  <div class="bg-blur blur-1"></div>

  <div class="bg-blur blur-2"></div>

  <div class="bg-blur blur-3"></div>


  <!-- ============================================ -->
  <!-- 🚀 APP CONTAINER -->
  <!-- ============================================ -->

  <div class="app-container">


    <!-- ============================================ -->
    <!-- 🧠 HEADER -->
    <!-- ============================================ -->

    <header class="app-header">

      <div>

        <h1 class="app-title">
          🚀 TaskFlow Pro
        </h1>

        <p class="app-subtitle">
          Organize your productivity beautifully
        </p>

      </div>


      <!-- 🌙 THEME BUTTON -->
      <button
        id="darkModeBtn"
        class="theme-btn"
      >
        🌙
      </button>

    </header>


    <!-- ============================================ -->
    <!-- 📊 STATS -->
    <!-- ============================================ -->

    <section class="stats-grid">

      <div class="stat-card glass">

        <h3>Total</h3>

        <span id="totalCount">
          0
        </span>

      </div>

      <div class="stat-card glass">

        <h3>Completed</h3>

        <span id="completedCount">
          0
        </span>

      </div>

      <div class="stat-card glass">

        <h3>Pending</h3>

        <span id="pendingCount">
          0
        </span>

      </div>

      <div class="stat-card glass">

        <h3>Streak</h3>

        <span id="streakCount">
          0 Done
        </span>

      </div>

    </section>


    <!-- ============================================ -->
    <!-- 📈 PROGRESS -->
    <!-- ============================================ -->

    <section class="glass progress-section">

      <div class="progress-header">

        <span>
          Productivity Progress
        </span>

        <span id="progressText">
          0%
        </span>

      </div>

      <div class="progress-bar">

        <div
          id="progressFill"
          class="progress-fill"
        ></div>

      </div>

    </section>


    <!-- ============================================ -->
    <!-- 💬 MOTIVATION -->
    <!-- ============================================ -->

    <section
      id="motivationBox"
      class="glass motivation-box"
    >
      🚀 Start your productive day!
    </section>


    <!-- ============================================ -->
    <!-- ⏰ CLOCK -->
    <!-- ============================================ -->

    <section class="glass live-clock-card">

      <span>
        Current Time
      </span>

      <h2 id="liveClock">
        00:00
      </h2>

    </section>


    <!-- ============================================ -->
    <!-- ➕ ADD TASK -->
    <!-- ============================================ -->

    <section class="glass add-task-card">

      <div class="input-group">

        <input
          type="text"
          id="taskInput"
          placeholder="Enter your task..."
        />

      </div>


      <div class="task-options">

        <input
          type="date"
          id="dueDateInput"
        />


        <select id="categoryInput">

          <option value="Personal">
            🏠 Personal
          </option>

          <option value="Study">
            📚 Study
          </option>

          <option value="Work">
            💼 Work
          </option>

          <option value="Health">
            💪 Health
          </option>

          <option value="Shopping">
            🛒 Shopping
          </option>

        </select>


        <select id="priorityInput">

          <option value="Low">
            🟢 Low
          </option>

          <option value="Medium">
            🟠 Medium
          </option>

          <option value="High">
            🔴 High
          </option>

        </select>

      </div>


      <button
        id="addTaskBtn"
        class="add-btn"
      >
        ➕ Add Task
      </button>

      <p id="errorMsg"></p>

    </section>


    <!-- ============================================ -->
    <!-- 🔍 SEARCH + FILTER -->
    <!-- ============================================ -->

    <section class="glass tools-section">

      <div class="search-box">

        <input
          type="text"
          id="searchInput"
          placeholder="Search tasks..."
        />

      </div>


      <div class="filter-buttons">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completed
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pending
        </button>

      </div>


      <div class="sort-box">

        <select id="sortSelect">

          <option value="newest">
            Newest
          </option>

          <option value="oldest">
            Oldest
          </option>

          <option value="priority">
            Priority
          </option>

          <option value="alphabetical">
            A-Z
          </option>

        </select>

      </div>

    </section>


    <!-- ============================================ -->
    <!-- 📋 TASK HEADER -->
    <!-- ============================================ -->

    <section class="task-header">

      <h2 id="taskCountLabel">
        0 Tasks
      </h2>

      <button
        id="clearAllBtn"
        class="clear-btn"
      >
        🗑️ Clear All
      </button>

    </section>


    <!-- ============================================ -->
    <!-- 📋 TASK LIST -->
    <!-- ============================================ -->

    <ul
      id="taskList"
      class="task-list"
    ></ul>


    <!-- ============================================ -->
    <!-- 🔔 TOAST -->
    <!-- ============================================ -->

    <div id="toast"></div>

  </div>


  <!-- ============================================ -->
  <!-- 📜 JAVASCRIPT -->
  <!-- ============================================ -->

  <script src="script.js"></script>

</body>

</html>
