<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    TaskFlow Pro Ultra
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="app">


    <!-- =====================================
         🚀 HEADER
    ====================================== -->

    <header class="header">

      <div class="header-top">

        <div class="logo">

          <h1>
            🚀 TaskFlow Pro
          </h1>

          <p>
            Ultra Modern Productivity Dashboard
          </p>

        </div>

        <div class="clock-box">

          <div class="clock-title">
            Live Time
          </div>

          <div id="liveClock">
            00:00
          </div>

        </div>

      </div>


      <!-- =====================================
           📈 PROGRESS
      ====================================== -->

      <div class="progress-section">

        <div class="progress-header">

          <span>
            Productivity Progress
          </span>

          <span id="progressText">
            0%
          </span>

        </div>

        <div class="progress-bar">

          <div
            class="progress-fill"
            id="progressFill"
          ></div>

        </div>

        <div class="progress-bottom">

          <div
            class="streak-box"
            id="streakCount"
          >
            0 Done
          </div>

          <div
            class="motivation-box"
            id="motivationBox"
          >
            🚀 Start your productive day!
          </div>

        </div>

      </div>

    </header>


    <!-- =====================================
         ✍️ INPUT CARD
    ====================================== -->

    <section class="input-card">

      <div class="input-grid">

        <input
          type="text"
          id="taskInput"
          placeholder="Enter your task..."
        >

        <input
          type="date"
          id="dueDateInput"
        >

        <select id="categoryInput">

          <option>
            Personal
          </option>

          <option>
            Study
          </option>

          <option>
            Work
          </option>

          <option>
            Health
          </option>

          <option>
            Shopping
          </option>

        </select>

        <select id="priorityInput">

          <option>
            Low
          </option>

          <option>
            Medium
          </option>

          <option>
            High
          </option>

        </select>

        <button
          class="add-btn"
          id="addTaskBtn"
        >
          ➕ Add
        </button>

      </div>

      <p id="errorMsg"></p>

    </section>


    <!-- =====================================
         🔍 TOOLBAR
    ====================================== -->

    <section class="toolbar">

      <div class="search-box">

        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks..."
        >

      </div>

      <div class="filters">

        <button
          class="filter-btn active"
          data-filter="all"
        >
          All
        </button>

        <button
          class="filter-btn"
          data-filter="completed"
        >
          Completed
        </button>

        <button
          class="filter-btn"
          data-filter="pending"
        >
          Pending
        </button>

      </div>

      <select
        id="sortSelect"
        class="sort-select"
      >

        <option value="newest">
          🆕 Newest
        </option>

        <option value="oldest">
          🕰️ Oldest
        </option>

        <option value="priority">
          🔥 Priority
        </option>

        <option value="alphabetical">
          🔤 A-Z
        </option>

      </select>

    </section>


    <!-- =====================================
         📊 STATS
    ====================================== -->

    <section class="stats-grid">

      <div class="stat-card">

        <div class="stat-title">
          Total Tasks
        </div>

        <div
          class="stat-number"
          id="totalCount"
        >
          0
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-title">
          Completed
        </div>

        <div
          class="stat-number"
          id="completedCount"
        >
          0
        </div>

      </div>

      <div class="stat-card">

        <div class="stat-title">
          Pending
        </div>

        <div
          class="stat-number"
          id="pendingCount"
        >
          0
        </div>

      </div>

    </section>


    <!-- =====================================
         📋 TASK SECTION
    ====================================== -->

    <section class="tasks-section">

      <div class="tasks-header">

        <h2 id="taskCountLabel">
          0 Tasks
        </h2>

        <div class="task-actions-top">

          <button
            class="action-btn export-btn"
            id="exportBtn"
          >
            📤 Export Tasks
          </button>

          <button
            class="action-btn clear-btn"
            id="clearAllBtn"
          >
            🗑️ Clear All
          </button>

        </div>

      </div>


      <!-- =====================================
           TASK LIST
      ====================================== -->

      <ul
        class="task-list"
        id="taskList"
      >

        <li class="empty-state">

          <div class="empty-icon">
            📝
          </div>

          <h3>
            No tasks found
          </h3>

          <p>
            Add a task and start being productive.
          </p>

        </li>

      </ul>

    </section>

  </div>


  <!-- =====================================
       🔔 TOAST
  ====================================== -->

  <div
    class="toast"
    id="toast"
  ></div>


  <!-- =====================================
       📜 SCRIPT
  ====================================== -->

  <script src="script.js"></script>

</body>
</html>
